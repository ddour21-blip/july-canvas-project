<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../assets/cardkit.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 16px; }
  .lbl { width: 100%; font: 700 11px/1 var(--font-sans); letter-spacing: .04em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 2px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Badge, StatusBadge, Avatar, AvatarStack, Card } = window.JulyCanvasDesignSystem_d81917;
function Demo() {
  return (
    <div>
      <div className="row">
        <span className="lbl">Project status</span>
        <StatusBadge status="draft" />
        <StatusBadge status="active" />
        <StatusBadge status="review" />
        <StatusBadge status="approved" />
        <StatusBadge status="handoff" />
      </div>
      <div className="row">
        <span className="lbl">Membership · counts · tags</span>
        <Badge tone="success">FREE (TRIAL)</Badge>
        <Badge tone="warning">PREMIUM</Badge>
        <Badge tone="brand">v1.0</Badge>
        <Badge tone="solid-danger">4</Badge>
        <span className="jc-tag">PRD.md</span>
        <span className="jc-tag jc-tag--neutral">v2.3</span>
      </div>
      <div className="row">
        <span className="lbl">Avatars</span>
        <Avatar name="김유나" size="sm" />
        <Avatar name="이준호" />
        <Avatar name="July" size="lg" />
        <AvatarStack people={[{name:'김유나'},{name:'이준호'},{name:'박지민'},{name:'최서연'},{name:'정민수'}]} max={3} />
      </div>
      <div className="row" style={{marginBottom:8}}><span className="lbl">Surfaces</span></div>
      <div className="cards">
        <Card padded>
          <div style={{font:'var(--type-card-title)', color:'var(--text-strong)', marginBottom:4}}>기본 카드</div>
          <div style={{font:'var(--type-body-sm)', color:'var(--text-secondary)'}}>흰 배경 · 부드러운 그림자 · 16px 라운드</div>
        </Card>
        <Card padded interactive>
          <div style={{font:'var(--type-card-title)', color:'var(--text-strong)', marginBottom:4}}>인터랙티브 카드</div>
          <div style={{font:'var(--type-body-sm)', color:'var(--text-secondary)'}}>호버 시 살짝 떠오르고 브랜드 보더</div>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
setTimeout(() => window.refreshIcons(), 60);
</script>
</body>
</html>
