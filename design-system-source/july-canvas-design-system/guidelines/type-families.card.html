<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-sans); color:var(--text-strong); }
  .eyebrow { font:700 10px/1 var(--font-sans); letter-spacing:.06em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:6px; }
  .specimen { font-weight:800; font-size:40px; letter-spacing:-.02em; line-height:1.1; }
  .mono { font-family:var(--font-mono); font-size:22px; font-weight:500; color:var(--gray-700); margin-top:14px; }
  .meta { font:500 12px/1.4 var(--font-sans); color:var(--text-secondary); margin-top:6px; }
</style></head>
<body>
<div class="eyebrow">Pretendard · Sans</div>
<div class="specimen">기획의 흐름을 잇다 — July Canvas</div>
<div class="meta">조직 · 프로젝트 · 기획 문서 · 프로토타입 · 제품화 산출물</div>
<div class="mono">Geist Mono — PRD.md · v1.0 · #screen_kc9x2</div>
</body></html>
