<!-- @dsCard group="Brand" viewport="700x230" name="Soft glass & green wash" subtitle="Restrained frosted surfaces over a faint green page wash" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; font-family:var(--font-sans); }
  .stage { position:relative; min-height:230px; background:var(--gradient-aurora); display:flex; align-items:center; justify-content:center; gap:18px; padding:28px; }
  .glass { background:var(--glass-fill); border:1px solid var(--glass-border); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); box-shadow:var(--shadow-lg); border-radius:20px; padding:20px 24px; width:230px; }
  .glass h4 { font:800 16px/1.2 var(--font-sans); color:var(--text-strong); margin-bottom:6px; }
  .glass p { font:500 12px/1.5 var(--font-sans); color:var(--text-secondary); }
  .pillbar { display:inline-flex; align-items:center; gap:10px; padding:10px 16px; border-radius:999px; background:var(--glass-fill-strong); border:1px solid var(--glass-border); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); box-shadow:var(--shadow-md); font:700 13px/1 var(--font-sans); color:var(--gray-700); }
  .dot { width:9px;height:9px;border-radius:999px;background:var(--color-live); }
</style></head>
<body>
<div class="stage">
  <div class="glass"><h4>Soft glass panel</h4><p>반투명 화이트 · blur(14px) · 은은한 그림자. 떠있는 툴바·스티키 바에만 제한적으로 사용합니다.</p></div>
  <div class="pillbar"><span class="dot"></span> 실시간 공유 켜짐</div>
</div>
</body></html>
