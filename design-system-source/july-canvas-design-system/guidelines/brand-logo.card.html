<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; font-family:var(--font-sans); display:grid; grid-template-columns:1fr 1fr; }
  .panel { display:flex; align-items:center; justify-content:center; gap:18px; padding:40px; min-height:120px; }
  .light { background:#fff; }
  .ink { background:var(--ink); }
</style></head>
<body>
<div class="panel light"><img src="../public/brand/logo/july-canvas-logo-light.svg" height="44" alt="July Canvas" /></div>
<div class="panel ink"><img src="../public/brand/logo/july-canvas-logo-dark.svg" height="44" alt="July Canvas" /></div>
</body></html>
